<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your LUXDRIVE account to start renting premium cars with ease.">
  <title>Register — LUXDRIVE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar"><div class="flex items-center justify-between max-w-[1400px] mx-auto w-full">
    <a href="index.html" class="text-2xl font-bold tracking-wider" style="font-family:'Manrope',sans-serif;">LUX<span style="color:var(--accent);">DRIVE</span></a>
    <div class="nav-links hidden md:flex items-center gap-8">
      <a href="index.html" class="nav-link">Home</a><a href="mobil.html" class="nav-link">Cars</a><a href="paket.html" class="nav-link">Packages</a><a href="testimoni.html" class="nav-link">Testimonials</a><a href="tentang.html" class="nav-link">About</a><a href="kontak.html" class="nav-link">Contact</a>
      <button class="theme-toggle" aria-label="Toggle theme"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg></button>
      <a href="sewa.html" class="btn-primary text-sm !py-2 !px-5">Rent Now</a>
    </div>
    <div class="flex items-center gap-3 md:hidden"><button class="theme-toggle" aria-label="Toggle theme"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg></button><button class="mobile-toggle">☰</button></div>
  </div></nav>
  <div class="mobile-menu"><button class="mobile-close">✕</button><a href="index.html" class="nav-link">Home</a><a href="mobil.html" class="nav-link">Cars</a><a href="paket.html" class="nav-link">Packages</a><a href="testimoni.html" class="nav-link">Testimonials</a><a href="tentang.html" class="nav-link">About</a><a href="kontak.html" class="nav-link">Contact</a><a href="login.html" class="nav-link">Login</a><a href="sewa.html" class="btn-primary mt-4">Rent Now</a></div>

  <section class="min-h-screen flex items-center justify-center px-4" style="padding-top:5rem;padding-bottom:3rem;">
    <div class="w-full max-w-lg" data-aos="fade-up">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold" style="font-family:'Manrope',sans-serif;">Create Your <span style="color:var(--accent);">Account</span></h1>
        <p class="text-secondary text-sm mt-2">Join LUXDRIVE and start your premium journey</p>
      </div>
      <div class="glass-strong p-8">
        <form onsubmit="event.preventDefault(); alert('Registration successful! Welcome to LUXDRIVE.'); window.location.href='login.html';">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="form-group"><label class="form-label" for="reg-first">First Name</label><input type="text" id="reg-first" class="form-input" placeholder="John" required></div>
            <div class="form-group"><label class="form-label" for="reg-last">Last Name</label><input type="text" id="reg-last" class="form-input" placeholder="Doe" required></div>
          </div>
          <div class="form-group"><label class="form-label" for="reg-email">Email Address</label><input type="email" id="reg-email" class="form-input" placeholder="your@email.com" required></div>
          <div class="form-group"><label class="form-label" for="reg-phone">Phone Number</label><input type="tel" id="reg-phone" class="form-input" placeholder="+62 812 xxxx xxxx" required></div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Min. 8 characters" required minlength="8">
            <div class="password-strength"><div class="strength-bar"></div><div class="strength-bar"></div><div class="strength-bar"></div><div class="strength-bar"></div></div>
            <p class="text-secondary text-xs mt-1">Use uppercase, numbers, and symbols for a stronger password</p>
          </div>
          <div class="form-group"><label class="form-label" for="reg-confirm">Confirm Password</label><input type="password" id="reg-confirm" class="form-input" placeholder="Re-enter your password" required></div>
          <label class="flex items-start gap-2 mb-6 cursor-pointer">
            <input type="checkbox" class="w-4 h-4 mt-0.5" required>
            <span class="text-secondary text-sm">I agree to the <a href="#" style="color:var(--accent);" class="hover:underline">Terms & Conditions</a> and <a href="#" style="color:var(--accent);" class="hover:underline">Privacy Policy</a></span>
          </label>
          <button type="submit" class="btn-primary w-full justify-center mb-4">Create Account</button>
        </form>
        <div class="flex items-center gap-4 my-6">
          <div class="flex-1 h-px" style="background:var(--border-subtle);"></div>
          <span class="text-secondary text-sm">or sign up with</span>
          <div class="flex-1 h-px" style="background:var(--border-subtle);"></div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <button class="glass-card flex items-center justify-center gap-2 p-3 text-sm cursor-pointer transition" onclick="alert('Google signup coming soon!')">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Google
          </button>
          <button class="glass-card flex items-center justify-center gap-2 p-3 text-sm cursor-pointer transition" onclick="alert('Facebook signup coming soon!')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
        </div>
      </div>
      <p class="text-center text-secondary text-sm mt-6">Already have an account? <a href="login.html" style="color:var(--accent);" class="hover:underline">Sign in here</a></p>
    </div>
  </section>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
