  <script src="../js/supabase-config.js"></script>
  <script src="js/admin.js"></script>
  <script>
    const formatIDR = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);

    const getStatusBadge = (status) => {
      if(status === 'Completed') return '<span class="px-2 py-1 bg-green-500/10 text-green-400 text-xs rounded-full font-medium border border-green-500/20">Completed</span>';
      if(status === 'Active') return '<span class="px-2 py-1 bg-accent-blue/10 text-accent-blue text-xs rounded-full font-medium border border-accent-blue/20">Active</span>';
      if(status === 'Pending') return '<span class="px-2 py-1 bg-yellow-500/10 text-yellow-400 text-xs rounded-full font-medium border border-yellow-500/20">Pending</span>';
      if(status === 'Cancelled') return '<span class="px-2 py-1 bg-red-500/10 text-red-400 text-xs rounded-full font-medium border border-red-500/20">Cancelled</span>';
      return `<span class="px-2 py-1 bg-gray-500/10 text-gray-400 text-xs rounded-full font-medium border border-gray-500/20">${status}</span>`;
    };

    let allBookings = [];

    async function loadBookings() {
      const tbody = document.getElementById('bookings-table-body');
      
      try {
        const { data: bookings, error } = await supabaseClient.from('bookings').select('*, customers(full_name), vehicles(name)').order('created_at', { ascending: false });
        if (error) throw error;
        
        allBookings = bookings;

        if (!bookings || bookings.length === 0) {
          tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-text-muted">No bookings found in database.</td></tr>`;
          return;
        }

        let html = '';
        bookings.forEach(b => {
          const custName = b.customers ? b.customers.full_name : "Unknown Customer";
          const vehName = b.vehicles ? b.vehicles.name : "Unknown Vehicle";

          html += `
            <tr class="hover:bg-white/5 transition-colors">
              <td class="px-6 py-4 font-medium text-accent-blue">${b.booking_ref}</td>
              <td class="px-6 py-4">${custName}</td>
              <td class="px-6 py-4">${vehName}</td>
              <td class="px-6 py-4"><p>${b.start_date} - ${b.end_date}</p><p class="text-xs text-text-muted">${b.duration_days} days</p></td>
              <td class="px-6 py-4">${formatIDR(b.total_amount)}</td>
              <td class="px-6 py-4">${getStatusBadge(b.status)}</td>
              <td class="px-6 py-4 text-right">
                <div class="flex justify-end gap-2">
                  <button onclick="editBooking('${b.id}')" class="p-1.5 text-accent-blue bg-accent-blue/10 hover:bg-accent-blue/20 rounded-md transition-colors" title="Edit">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                  </button>
                  <button onclick="deleteBooking('${b.id}')" class="p-1.5 text-red-400 bg-red-500/10 hover:bg-red-500/20 rounded-md transition-colors" title="Delete">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                  </button>
                </div>
              </td>
            </tr>
          `;
        });
        tbody.innerHTML = html;
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-red-400">Error: ${err.message}</td></tr>`;
      }
    }

    // Delete Logic
    window.deleteBooking = async (id) => {
      if (confirm('Are you sure you want to delete this booking?')) {
        const { error } = await supabaseClient.from('bookings').delete().eq('id', id);
        if (error) alert("Error deleting booking: " + error.message);
        else loadBookings();
      }
    };

    // Edit Logic
    const editModal = document.getElementById('modal-edit-booking');
    window.editBooking = (id) => {
      const b = allBookings.find(x => x.id === id);
      if (b) {
        document.getElementById('edit-b-id').value = b.id;
        
        const custEl = document.getElementById('edit-b-customer');
        if([...custEl.options].some(o => o.value === b.customer_id)) {
            custEl.value = b.customer_id;
        } else {
            const opt = document.createElement('option');
            opt.value = b.customer_id;
            opt.text = b.customers ? b.customers.full_name : b.customer_id;
            custEl.add(opt);
            custEl.value = b.customer_id;
        }

        const vehEl = document.getElementById('edit-b-vehicle');
        if([...vehEl.options].some(o => o.value === b.vehicle_id)) {
            vehEl.value = b.vehicle_id;
        } else {
            const opt = document.createElement('option');
            opt.value = b.vehicle_id;
            opt.text = b.vehicles ? b.vehicles.name : b.vehicle_id;
            vehEl.add(opt);
            vehEl.value = b.vehicle_id;
        }

        // Handle date formats
        let startVal = b.start_date;
        let endVal = b.end_date;
        
        if (startVal && !startVal.match(/^\d{4}-\d{2}-\d{2}$/)) {
            const d = new Date(startVal + " " + new Date().getFullYear());
            if(!isNaN(d)) startVal = d.toISOString().split('T')[0];
        }
        if (endVal && !endVal.match(/^\d{4}-\d{2}-\d{2}$/)) {
            const d = new Date(endVal + " " + new Date().getFullYear());
            if(!isNaN(d)) endVal = d.toISOString().split('T')[0];
        }

        document.getElementById('edit-b-start').value = startVal;
        document.getElementById('edit-b-end').value = endVal;
        document.getElementById('edit-b-duration').value = b.duration_days;
        document.getElementById('edit-b-amount').value = b.total_amount;
        document.getElementById('edit-b-status').value = b.status;
        editModal.classList.remove('hidden');
      }
    };
    
    document.getElementById('btn-close-edit-booking').addEventListener('click', () => editModal.classList.add('hidden'));
    document.getElementById('btn-cancel-edit-booking').addEventListener('click', () => editModal.classList.add('hidden'));
    document.getElementById('modal-edit-booking-bg').addEventListener('click', () => editModal.classList.add('hidden'));
    
    document.getElementById('form-edit-booking').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('edit-b-id').value;
      const vehicleId = document.getElementById('edit-b-vehicle').value;
      const newStatus = document.getElementById('edit-b-status').value;
      
      const btn = e.submitter || document.querySelector('#form-edit-booking button[type="submit"]');
      const originalText = btn.innerHTML;
      btn.innerHTML = 'Updating...';
      btn.disabled = true;

      const updates = {
        customer_id: document.getElementById('edit-b-customer').value,
        vehicle_id: vehicleId,
        start_date: document.getElementById('edit-b-start').value,
        end_date: document.getElementById('edit-b-end').value,
        duration_days: parseInt(document.getElementById('edit-b-duration').value) || 0,
        total_amount: parseInt(document.getElementById('edit-b-amount').value) || 0,
        status: newStatus
      };
      
      try {
        const { error } = await supabaseClient.from('bookings').update(updates).eq('id', id);
        if(error) throw error;

        // Auto-update vehicle status based on booking status
        if (newStatus === 'Active') {
            await supabaseClient.from('vehicles').update({ status: 'On Rent' }).eq('id', vehicleId);
        } else if (newStatus === 'Completed' || newStatus === 'Cancelled') {
            await supabaseClient.from('vehicles').update({ status: 'Available' }).eq('id', vehicleId);
        }

        editModal.classList.add('hidden'); 
        loadBookings(); 
        loadFormOptions(); // Refresh available vehicles
      } catch (err) {
        alert("Error updating: " + err.message);
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    });

    // Form Options & Calculations
    async function loadFormOptions() {
      // Load Customers
      const { data: customers } = await supabaseClient.from('customers').select('id, full_name, status').order('full_name');
      const bCust = document.getElementById('b-customer');
      const eCust = document.getElementById('edit-b-customer');
      let custHtml = '<option value="">Select a customer...</option>';
      let editCustHtml = '<option value="">Select a customer...</option>';
      if (customers) {
        customers.forEach(c => {
          if (c.status === 'Verified') {
            custHtml += `<option value="${c.id}">${c.full_name}</option>`;
          }
          editCustHtml += `<option value="${c.id}">${c.full_name} (${c.status})</option>`;
        });
      }
      if (bCust) bCust.innerHTML = custHtml;
      if (eCust) eCust.innerHTML = editCustHtml;

      // Load Vehicles
      const { data: vehicles } = await supabaseClient.from('vehicles').select('id, name, status, daily_rate').order('name');
      const bVeh = document.getElementById('b-vehicle');
      const eVeh = document.getElementById('edit-b-vehicle');
      let vehHtml = '<option value="" data-rate="0">Select a vehicle (Available only)...</option>';
      let editVehHtml = '<option value="" data-rate="0">Select a vehicle...</option>';
      if (vehicles) {
        vehicles.forEach(v => {
          if (v.status === 'Available') {
            vehHtml += `<option value="${v.id}" data-rate="${v.daily_rate}">${v.name} - ${formatIDR(v.daily_rate)}/day</option>`;
          }
          editVehHtml += `<option value="${v.id}" data-rate="${v.daily_rate}">${v.name} (${v.status}) - ${formatIDR(v.daily_rate)}/day</option>`;
        });
      }
      if (bVeh) bVeh.innerHTML = vehHtml;
      if (eVeh) eVeh.innerHTML = editVehHtml;
    }

    function calculateDurationAndAmount(prefix) {
      const startEl = document.getElementById(`${prefix}-start`);
      const endEl = document.getElementById(`${prefix}-end`);
      const vehEl = document.getElementById(`${prefix}-vehicle`);
      const durEl = document.getElementById(`${prefix}-duration`);
      const amtEl = document.getElementById(`${prefix}-amount`);

      if (startEl.value && endEl.value) {
        const start = new Date(startEl.value);
        const end = new Date(endEl.value);
        const diffTime = Math.abs(end - start);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
        
        let days = diffDays;
        if (end < start) days = 0;
        if (days === 0 && startEl.value === endEl.value) days = 1;

        durEl.value = days;

        const selectedOption = vehEl.options[vehEl.selectedIndex];
        const rate = selectedOption ? parseInt(selectedOption.getAttribute('data-rate') || 0) : 0;
        
        amtEl.value = days * rate;
      } else {
        durEl.value = '';
        amtEl.value = '';
      }
    }

    // Attach listeners
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('b-start').min = today;

    ['b', 'edit-b'].forEach(prefix => {
        const startEl = document.getElementById(`${prefix}-start`);
        const endEl = document.getElementById(`${prefix}-end`);
        
        startEl.addEventListener('change', () => {
            endEl.min = startEl.value;
            if (endEl.value && endEl.value < startEl.value) {
                endEl.value = '';
            }
            calculateDurationAndAmount(prefix);
        });

        document.getElementById(`${prefix}-end`).addEventListener('change', () => calculateDurationAndAmount(prefix));
        document.getElementById(`${prefix}-vehicle`).addEventListener('change', () => calculateDurationAndAmount(prefix));
    });

    // Add New Booking
    document.addEventListener('DOMContentLoaded', () => {
      loadBookings();
      loadFormOptions();

      const addModal = document.getElementById('modal-new-booking');
      document.getElementById('btn-new-booking').addEventListener('click', () => addModal.classList.remove('hidden'));
      document.getElementById('btn-close-booking').addEventListener('click', () => addModal.classList.add('hidden'));
      document.getElementById('btn-cancel-booking').addEventListener('click', () => addModal.classList.add('hidden'));
      document.getElementById('modal-new-booking-bg').addEventListener('click', () => addModal.classList.add('hidden'));

      document.getElementById('form-new-booking').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit-booking');
        const originalText = btn.innerHTML;
        btn.innerHTML = 'Saving...';
        btn.disabled = true;

        const newBooking = {
          booking_ref: '#BKG-' + Math.floor(1000 + Math.random() * 9000),
          customer_id: document.getElementById('b-customer').value,
          vehicle_id: document.getElementById('b-vehicle').value,
          start_date: document.getElementById('b-start').value,
          end_date: document.getElementById('b-end').value,
          duration_days: parseInt(document.getElementById('b-duration').value) || 0,
          total_amount: parseInt(document.getElementById('b-amount').value) || 0,
          status: document.getElementById('b-status').value
        };

        try {
          const { error } = await supabaseClient.from('bookings').insert([newBooking]);
          if (error) throw error;
          
          if (newBooking.status === 'Active') {
            await supabaseClient.from('vehicles').update({ status: 'On Rent' }).eq('id', newBooking.vehicle_id);
          }

          document.getElementById('form-new-booking').reset();
          addModal.classList.add('hidden');
          loadBookings();
          loadFormOptions(); 
        } catch (error) { alert("Error adding booking: " + error.message); } 
        finally { btn.innerHTML = originalText; btn.disabled = false; }
      });
    });
  </script>
</body>
</html>
