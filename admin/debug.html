<!DOCTYPE html>
<html>
<head>
    <title>Debug Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #111; color: #0f0; font-family: monospace; padding: 20px; }
        .ok { color: #0f0; }
        .err { color: #f00; }
        .warn { color: #ff0; }
        pre { background: #222; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔧 LUXDRIVE Dashboard Debug</h1>
    <div id="output">Loading...</div>

    <script src="../js/supabase-config.js"></script>
    <script>
        const out = document.getElementById('output');
        let log = '';

        function add(msg, type = 'ok') {
            log += `<p class="${type}">» ${msg}</p>`;
            out.innerHTML = log;
        }

        (async () => {
            // 1. Check supabaseClient
            add('Checking supabaseClient...');
            if (typeof supabaseClient === 'undefined') {
                add('❌ supabaseClient is UNDEFINED! supabase-config.js failed to load.', 'err');
                return;
            }
            add('✅ supabaseClient is available');

            // 2. Check auth session
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    add(`✅ Logged in as: ${session.user.email}`);
                } else {
                    add('⚠️ NOT logged in (no session). Auth guard may redirect you.', 'warn');
                }
            } catch(e) {
                add(`❌ Auth error: ${e.message}`, 'err');
            }

            // 3. Fetch bookings
            add('--- Fetching BOOKINGS ---');
            try {
                const { data, error } = await supabaseClient.from('bookings').select('*').limit(5);
                if (error) {
                    add(`❌ Bookings error: ${error.message}`, 'err');
                    add(`Error details: ${JSON.stringify(error)}`, 'err');
                } else {
                    add(`✅ Bookings count: ${data ? data.length : 0}`);
                    if (data && data.length > 0) {
                        add(`Columns: ${Object.keys(data[0]).join(', ')}`);
                        add(`<pre>${JSON.stringify(data[0], null, 2)}</pre>`);
                    } else {
                        add('⚠️ Bookings table is EMPTY (0 rows)', 'warn');
                    }
                }
            } catch(e) {
                add(`❌ Bookings catch: ${e.message}`, 'err');
            }

            // 4. Fetch bookings with JOIN
            add('--- Fetching BOOKINGS with JOIN ---');
            try {
                const { data, error } = await supabaseClient.from('bookings').select('*, customers(full_name), vehicles(name)').limit(3);
                if (error) {
                    add(`❌ JOIN error: ${error.message}`, 'err');
                    add(`This means the foreign key relation is NOT set up in Supabase!`, 'warn');
                } else {
                    add(`✅ JOIN works! ${data ? data.length : 0} rows`);
                    if (data && data.length > 0) {
                        add(`<pre>${JSON.stringify(data[0], null, 2)}</pre>`);
                    }
                }
            } catch(e) {
                add(`❌ JOIN catch: ${e.message}`, 'err');
            }

            // 5. Fetch vehicles
            add('--- Fetching VEHICLES ---');
            try {
                const { data, error } = await supabaseClient.from('vehicles').select('*').limit(5);
                if (error) {
                    add(`❌ Vehicles error: ${error.message}`, 'err');
                } else {
                    add(`✅ Vehicles count: ${data ? data.length : 0}`);
                    if (data && data.length > 0) {
                        add(`Columns: ${Object.keys(data[0]).join(', ')}`);
                        add(`Sample: ${data[0].name} | status: ${data[0].status} | category: ${data[0].category}`);
                    } else {
                        add('⚠️ Vehicles table is EMPTY', 'warn');
                    }
                }
            } catch(e) {
                add(`❌ Vehicles catch: ${e.message}`, 'err');
            }

            // 6. Fetch customers
            add('--- Fetching CUSTOMERS ---');
            try {
                const { data, error } = await supabaseClient.from('customers').select('*').limit(5);
                if (error) {
                    add(`❌ Customers error: ${error.message}`, 'err');
                } else {
                    add(`✅ Customers count: ${data ? data.length : 0}`);
                    if (data && data.length > 0) {
                        add(`Columns: ${Object.keys(data[0]).join(', ')}`);
                    } else {
                        add('⚠️ Customers table is EMPTY', 'warn');
                    }
                }
            } catch(e) {
                add(`❌ Customers catch: ${e.message}`, 'err');
            }

            add('--- DEBUG COMPLETE ---');
        })();
    </script>
</body>
</html>
